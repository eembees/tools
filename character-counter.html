<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Character Counter</title>
  <meta name="description" content="Count characters, words, and lines in any text instantly.">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
      color: #24292e;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p.subtitle { color: #586069; margin-bottom: 1.5rem; }
    textarea {
      width: 100%;
      height: 250px;
      padding: 0.75rem;
      font-size: 1rem;
      border: 1px solid #d1d5da;
      border-radius: 6px;
      resize: vertical;
      box-sizing: border-box;
      font-family: inherit;
    }
    .stats {
      display: flex;
      gap: 1.5rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }
    .stat {
      background: #f6f8fa;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      padding: 0.75rem 1.25rem;
      text-align: center;
      min-width: 100px;
    }
    .stat-value {
      font-size: 1.75rem;
      font-weight: 600;
      color: #0366d6;
    }
    .stat-label {
      font-size: 0.8rem;
      color: #586069;
      margin-top: 0.2rem;
    }
  </style>
</head>
<body>
  <h1>Character Counter</h1>
  <p class="subtitle">Count characters, words, and lines in your text.</p>

  <textarea id="input" placeholder="Paste or type your text here..." autofocus></textarea>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="chars">0</div>
      <div class="stat-label">Characters</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="chars-no-spaces">0</div>
      <div class="stat-label">No spaces</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="words">0</div>
      <div class="stat-label">Words</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="lines">0</div>
      <div class="stat-label">Lines</div>
    </div>
  </div>

  <script>
    const input = document.getElementById('input');
    const chars = document.getElementById('chars');
    const charsNoSpaces = document.getElementById('chars-no-spaces');
    const words = document.getElementById('words');
    const lines = document.getElementById('lines');

    input.addEventListener('input', update);

    function update() {
      const text = input.value;
      chars.textContent = text.length;
      charsNoSpaces.textContent = text.replace(/\s/g, '').length;
      words.textContent = text.trim() ? text.trim().split(/\s+/).length : 0;
      lines.textContent = text ? text.split('\n').length : 0;
    }
  </script>
  <script src="/footer.js"></script>
</body>
</html>
